name: devx Security Scan (Required)

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'

jobs:
  security:
    uses: devx-commerce/.github/.github/workflows/devx-security-scanners.yml@main
    permissions:
      contents: write
      pull-requests: write
      checks: write
      issues: write

